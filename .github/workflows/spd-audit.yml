name: SPD Security Audit
on: [push, repository_dispatch]
jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install flask bandit
          if [ -f requirements.txt ]; then python3 -m pip install -r requirements.txt; fi

      - name: SAST Scan (python)
        run: |
          bandit -r . -f txt -o bandit_report.txt || true

      # 4. Start Application
      - name: Start Application
        run: |
          # CRITICAL: Fix permissions BEFORE ZAP runs
          chmod -R 777 .
          python3 app.py > app_log.txt 2>&1 & 
          sleep 30 

      # 5. OWASP ZAP DAST Scan
      - name: OWASP ZAP DAST Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          token: ${{ github.token }}
          target: 'http://localhost:5000'
          # We go back to manual file naming
          cmd_options: '-r zap_report.html'
          fail_action: false

      # 6. BYPASS GITHUB ARTIFACTS: Upload to Cloud and Show Link
      - name: External Report Upload
        if: always()
        run: |
          # Fix permissions so we can read the file
          sudo chown -R $USER:$USER .
          
          echo "--- SPD SECURITY REPORT LINKS ---"
          
          # Upload Bandit Report
          curl -T bandit_report.txt https://bashupload.com/bandit_results.txt
          echo ""
          
          # Upload ZAP Report
          curl -T zap_report.html https://bashupload.com/zap_results.html
          echo ""
          echo "----------------------------------"
