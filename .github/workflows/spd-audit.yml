name: SPD Security Audit
on: [push, repository_dispatch]
jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install flask bandit
          if [ -f requirements.txt ]; then python3 -m pip install -r requirements.txt; fi

      - name: SAST Scan (python)
        run: |
          bandit -r . -f txt -o bandit_report.txt || true

      - name: Start Application
        run: |
          python3 app.py > app_log.txt 2>&1 & 
          sleep 30 

      - name: OWASP ZAP DAST Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          token: ${{ github.token }}
          target: 'http://localhost:5000'
          # ZAP handles its own upload here
          artifact_name: 'zap-report'
          fail_action: false

      - name: Upload Bandit Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-results
          path: bandit_report.txt
